<!DOCTYPE html>

<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Noto+Sans+TC:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;background:#f5f2eb;color:#1a1a2e;font-size:13px}
 
header{background:#1c2b4a;color:#fff;padding:14px 24px;display:flex;align-items:center;gap:12px;border-bottom:3px solid #c8a020}
header h1{font-family:'Noto Serif TC',serif;font-size:17px;font-weight:700;letter-spacing:.1em}
 
.wrap{display:flex;height:calc(100vh - 57px)}
 
/* 左側面板 */
.panel{width:280px;background:#fff;border-right:1px solid #ddd5be;display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0}
.block{padding:16px;border-bottom:1px solid #f0ece0}
.blabel{font-size:10px;font-weight:500;letter-spacing:.12em;color:#888;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.blabel::before{content:'';width:3px;height:11px;background:#c8a020;border-radius:2px;display:inline-block}
 
/* 上傳區 */
.drop{border:1.5px dashed #ccc;border-radius:8px;padding:20px 12px;text-align:center;cursor:pointer;background:#faf8f3;transition:.2s}
.drop:hover{border-color:#c8a020;background:#fef9ec}
.drop-ico{font-size:26px;margin-bottom:8px}
.drop-txt{font-size:12px;color:#777}
.drop-txt b{color:#1c2b4a}
input[type=file]{display:none}
 
/* 檔案清單 */
.flist{margin-top:10px;display:flex;flex-direction:column;gap:6px}
.fchip{display:flex;align-items:center;gap:8px;border:1px solid #ddd;border-left:3px solid #2e7d52;border-radius:6px;padding:8px 10px;background:#fff}
.fchip-info{flex:1;overflow:hidden}
.fchip-branch{font-size:11px;font-weight:600;color:#c8a020}
.fchip-name{font-size:11px;color:#555;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fchip-rm{background:none;border:none;cursor:pointer;color:#aaa;font-size:16px;padding:0}
.fchip-rm:hover{color:#c0392b}
 
.log{font-size:11px;color:#888;line-height:2;max-height:60px;overflow-y:auto;margin-top:8px}
.log .ok{color:#2e7d52}.log .er{color:#c0392b}
 
/* 按鈕 */
.btn{width:100%;padding:11px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;border:none;font-family:inherit;transition:.15s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-navy{background:#1c2b4a;color:#fff}
.btn-navy:hover{background:#243560}
.btn-navy:disabled{background:#aaa;cursor:not-allowed}
.btn-gold{background:#c8a020;color:#1c2b4a;font-weight:700}
.btn-gold:hover{background:#d4b030}
.btn-gold:disabled{background:#ddd;color:#999;cursor:not-allowed}
 
/* 主區域 */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.tabs{background:#fff;border-bottom:1px solid #ddd;display:flex;padding:0 20px}
.tab{padding:13px 16px;font-size:12px;font-weight:500;color:#999;cursor:pointer;border-bottom:2px solid transparent;transition:.15s}
.tab:hover{color:#1c2b4a}
.tab.on{color:#1c2b4a;border-bottom-color:#c8a020}
.tab-info{margin-left:auto;display:flex;align-items:center;font-size:11px;color:#999;padding:0 4px}
 
.content{flex:1;overflow:auto;padding:20px}
 
.statusbar{background:#fff;border-top:1px solid #ddd;padding:7px 20px;display:flex;align-items:center;gap:8px;font-size:11px;color:#999}
.dot{width:6px;height:6px;border-radius:50%;background:#ccc;flex-shrink:0}
.dot.ok{background:#2e7d52}.dot.run{background:#c8a020;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
 
/* 空狀態 */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:320px;color:#aaa;gap:12px;text-align:center}
.empty-ico{font-size:56px;opacity:.2}
.empty-t{font-size:15px;font-weight:500;color:#777}
.empty-s{font-size:12px;max-width:300px;line-height:1.8}
 
/* 指標卡 */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:18px}
.card{background:#fff;border:1px solid #ddd;border-radius:8px;padding:13px 15px}
.card.hl{border-left:3px solid #c8a020}
.card-l{font-size:10px;color:#999;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.card-v{font-size:20px;font-weight:700;font-family:'Noto Serif TC',serif;color:#1c2b4a}
.card-s{font-size:11px;color:#999;margin-top:2px}
 
/* 工作表切換 */
.stabs{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
.stab{padding:5px 12px;border-radius:4px;font-size:12px;cursor:pointer;border:1px solid #ddd;background:#fff;color:#666;font-family:inherit;transition:.15s}
.stab:hover{border-color:#1c2b4a}
.stab.on{background:#1c2b4a;color:#fff;border-color:#1c2b4a}
 
/* 分院切換 */
.btabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.btab{padding:5px 13px;border-radius:4px;font-size:12px;cursor:pointer;border:1px solid #ddd;background:#fff;color:#666;font-family:inherit;transition:.15s}
.btab.on{background:#1c2b4a;color:#fff;border-color:#1c2b4a}
 
/* 表格 */
.twrap{background:#fff;border:1px solid #ddd;border-radius:8px;overflow:hidden;margin-bottom:16px}
.thead-bar{padding:10px 14px;background:#1c2b4a;color:#fff;display:flex;align-items:center;gap:10px}
.thead-bar .tt{font-size:12px;font-weight:600}
.thead-bar .ts{font-size:11px;color:rgba(255,255,255,.45)}
.tscroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#f3f0e8;color:#1c2b4a;font-weight:600;padding:7px 9px;text-align:right;border-bottom:1px solid #ddd;white-space:nowrap;font-size:11px}
th:first-child{text-align:left}
td{padding:6px 9px;border-bottom:1px solid #f5f0e8;color:#444;text-align:right;vertical-align:middle}
td:first-child{text-align:left;color:#1a1a2e}
td.i1{padding-left:20px}td.i2{padding-left:34px}td.i3{padding-left:48px;color:#777;font-size:11px}
tr:hover td{background:#fffdf5}
.num{font-variant-numeric:tabular-nums}
.neg{color:#c0392b}
 
/* 處理遮罩 */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:999}
.overlay.show{display:flex}
.obox{background:#fff;border-radius:12px;padding:30px 40px;text-align:center;min-width:260px}
.spin{width:36px;height:36px;border:3px solid #f0ece0;border-top-color:#c8a020;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.obox-t{font-size:15px;font-weight:600;color:#1c2b4a;margin-bottom:6px}
.obox-s{font-size:12px;color:#888}
</style>

<body>
 
<header>
  <span style="font-size:22px">📊</span>
  <h1>分院會計月報合併系統</h1>
</header>
 
<div class="wrap">
  <div class="panel">
    <div class="block">
      <div class="blabel">步驟一：上傳月報</div>
      <div class="drop" id="dz" onclick="document.getElementById('fi').click()">
        <div class="drop-ico">📂</div>
        <div class="drop-txt"><b>點擊選取</b>或拖曳 .xls 至此<br>可同時選取多個檔案</div>
      </div>
      <input type="file" id="fi" accept=".xls,.xlsx" multiple onchange="handleFiles(this.files)">
      <div class="flist" id="flist"></div>
      <div class="log" id="log"></div>
    </div>
 
    <div class="block">
      <div class="blabel">步驟二：產生合併</div>
      <button class="btn btn-navy" id="mergeBtn" onclick="doMerge()">⚡ 產生合併月報</button>
      <div style="font-size:11px;color:#999;margin-top:8px;text-align:center" id="mergeInfo">請先上傳分院月報</div>
    </div>
 
    <div class="block">
      <div class="blabel">步驟三：下載</div>
      <button class="btn btn-gold" id="dlBtn" onclick="doExport()" disabled>⬇ 下載合併月報 Excel</button>
      <div style="font-size:11px;color:#999;margin-top:8px;text-align:center">包含所有共通工作表</div>
    </div>
  </div>
 
  <div class="main">
    <div class="tabs">
      <div class="tab on" id="tab-sum" onclick="switchTab('sum')">加總總覽</div>
      <div class="tab" id="tab-detail" onclick="switchTab('detail')">各分院明細</div>
      <div class="tab" id="tab-list" onclick="switchTab('list')">工作表清單</div>
      <div class="tab-info" id="tabInfo"></div>
    </div>
    <div class="content" id="content">
      <div class="empty">
        <div class="empty-ico">📋</div>
        <div class="empty-t">尚未載入資料</div>
        <div class="empty-s">請上傳各分院的會計月報 .xls 檔案，再點擊「產生合併月報」</div>
      </div>
    </div>
    <div class="statusbar">
      <div class="dot" id="dot"></div>
      <span id="stxt">就緒</span>
    </div>
  </div>
</div>
 
<div class="overlay" id="overlay">
  <div class="obox">
    <div class="spin"></div>
    <div class="obox-t">合併處理中...</div>
    <div class="obox-s" id="omsg">正在讀取資料</div>
  </div>
</div>
 
<script>
// ===== 設定 =====
// 工作表別名對應表（處理各分院名稱不同的情況）
const ALIASES = {
  '管總 ':'管總','研發 ':'研發','業外費用 ':'業外費用',
  '代管資產檢核 ':'代管資產檢核','信託代理與保證資產 ':'信託代理與保證資產',
  '購建固資 ':'購建固資','營運量值表':'量值',
  '關鍵資訊-契僱人力-照服員':'關鍵資訊-照服員',
  '關鍵資訊 -契僱人員-照服員':'關鍵資訊-照服員',
};
 
// 排除的工作表
const EXCLUDE = new Set(['封面','目次','附件封面','附件目次','Sheet1','Sheet5',
  '試算表-中榮','試算表-中榮本院','試算表-中榮馬蘭',
  '固定資產-本院','固定資產-花榮','固定資產-台東','固定資產-蘇澳',
  '代管資產-本院','代管資產-花榮','代管資產-台東','代管資產-蘇澳',
  '資產','負債','資金存儲',
  '資產明細表-中榮','負債明細表-中榮',
  '收支-中榮','平衡-中榮','業收-中榮','業外收-中榮','醫成-中榮',
  '其他業成-中榮','管總-中榮','研發-中榮','業外費用-中榮']);
 
// 顯示順序
const CORE_ORDER = ['收支','平衡','業收','業外收','醫成','其他業成','管總','研發',
  '業外費用','量值','各項費用','購建固資','固資檢核','代管資產檢核',
  '資產明細表','負債明細表','信託代理與保證資產','遞延資產執行明細',
  '關鍵資訊','關鍵資訊-照服員'];
 
// ===== 狀態 =====
let loaded = [];
let merged = {};
let curTab = 'sum';
let curSheet = '收支';
let curBranch = null;
 
// ===== 標準化工作表名稱 =====
function normSheet(name) {
  const t = name.trim();
  return ALIASES[t] || ALIASES[name] || t;
}
 
// ===== 拖曳上傳 =====
const dz = document.getElementById('dz');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.style.borderColor='#c8a020'; });
dz.addEventListener('dragleave', () => { dz.style.borderColor='#ccc'; });
dz.addEventListener('drop', e => {
  e.preventDefault();
  dz.style.borderColor = '#ccc';
  handleFiles(e.dataTransfer.files);
});
 
function handleFiles(files) {
  for (const f of files) {
    if (loaded.find(x => x.name === f.name)) continue;
    readFile(f);
  }
}
 
function readFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(e.target.result, { type: 'binary' });
      const branch = getBranch(file.name, wb);
      const period = getPeriod(wb);
      loaded.push({ name: file.name, branch, period, wb });
      addLog('✓ ' + branch, 'ok');
      renderFiles();
      updateMergeInfo();
      setStat('已載入 ' + loaded.length + ' 個分院', 'ok');
    } catch(err) {
      addLog('✗ 讀取失敗：' + file.name, 'er');
    }
  };
  reader.readAsBinaryString(file);
}
 
function getBranch(fname, wb) {
  try {
    if (wb.SheetNames.includes('封面')) {
      const d = XLSX.utils.sheet_to_json(wb.Sheets['封面'], {header:1, defval:''});
      for (const row of d) for (const c of row) {
        const s = String(c).trim();
        if (s.includes('分院') && s.length < 35)
          return s.replace('臺北榮民總醫院作業基金－','').replace(/作業基金.*/,'');
      }
    }
  } catch(e) {}
  return fname.split(/[-－_]/)[0].trim();
}
 
function getPeriod(wb) {
  try {
    if (wb.SheetNames.includes('封面')) {
      const d = XLSX.utils.sheet_to_json(wb.Sheets['封面'], {header:1, defval:''});
      for (const row of d) for (const c of row) {
        const s = String(c).trim();
        if (/\d+年\d+月/.test(s)) return s;
      }
    }
  } catch(e) {}
  return '';
}
 
function renderFiles() {
  document.getElementById('flist').innerHTML = loaded.map((f, i) =>
    '<div class="fchip">' +
    '<div class="fchip-info">' +
    '<div class="fchip-branch">' + f.branch + '</div>' +
    '<div class="fchip-name" title="' + f.name + '">' + f.name + '</div>' +
    '</div>' +
    '<button class="fchip-rm" onclick="removeFile(' + i + ')">✕</button>' +
    '</div>'
  ).join('');
}
 
function removeFile(i) {
  loaded.splice(i, 1);
  renderFiles();
  updateMergeInfo();
}
 
function updateMergeInfo() {
  const info = document.getElementById('mergeInfo');
  if (loaded.length === 0) info.textContent = '請先上傳分院月報';
  else info.textContent = '已載入 ' + loaded.length + ' 個分院，可開始合併';
}
 
function addLog(msg, cls) {
  const el = document.getElementById('log');
  el.innerHTML += '<div class="' + (cls||'') + '">' + msg + '</div>';
  el.scrollTop = el.scrollHeight;
}
 
// ===== 合併 =====
async function doMerge() {
  if (loaded.length === 0) {
    alert('請先上傳分院月報檔案！');
    return;
  }
 
  document.getElementById('overlay').classList.add('show');
  document.getElementById('omsg').textContent = '正在分析工作表...';
  setStat('合併中...', 'run');
  await sleep(80);
 
  merged = {};
 
  // 建立每個分院的 normName -> 原始sheet名稱 對應
  const fileMaps = loaded.map(f => {
    const map = {};
    for (const s of f.wb.SheetNames) {
      const n = normSheet(s);
      if (!map[n] && !EXCLUDE.has(n)) map[n] = s;
    }
    return map;
  });
 
  // 找所有分院都有的工作表
  let common = new Set(Object.keys(fileMaps[0]));
  for (const m of fileMaps) {
    common = new Set([...common].filter(s => m[s]));
  }
 
  const sheets = [...common].filter(s => !EXCLUDE.has(s));
 
  // 逐張合併
  for (const normName of sheets) {
    document.getElementById('omsg').textContent = '合併：' + normName;
    await sleep(15);
    try {
      merged[normName] = mergeOneSheet(normName, fileMaps);
    } catch(e) {
      console.warn('合併失敗：', normName, e);
    }
  }
 
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('dlBtn').disabled = false;
  document.getElementById('tabInfo').textContent =
    loaded.map(f => f.branch).join(' + ') + '｜' + (loaded[0]?.period || '') +
    '｜共 ' + Object.keys(merged).length + ' 張工作表';
  setStat('合併完成｜' + loaded.length + '個分院、' + Object.keys(merged).length + '張工作表', 'ok');
 
  curSheet = merged['收支'] ? '收支' : Object.keys(merged)[0];
  curBranch = loaded[0]?.branch || null;
  renderTab();
}
 
function mergeOneSheet(normName, fileMaps) {
  // 收支類報表：只保留前13欄（必須在 branchData 之前宣告）
  const TRUNCATE_AT2 = {'收支':13,'業收':13,'業外收':13,'醫成':13,'其他業成':13,'管總':13,'研發':13,'業外費用':13};
  const truncateCols2 = TRUNCATE_AT2[normName] || null;
 
  // 讀取各分院原始資料
  const branchData = loaded.map((f, fi) => {
    const origName = fileMaps[fi][normName];
    if (!origName) return { branch: f.branch, rows: [], visibleRows: null };
    const ws = f.wb.Sheets[origName];
    let rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:'', raw:true });
    // 截斷欄位（收支類報表只保留前13欄）
    if (truncateCols2) rows = rows.map(r => r.slice(0, truncateCols2));
 
    // 取得可見列的集合（!rows 資訊）
    let visibleRows = null;
    if (normName === '購建固資') {
      visibleRows = new Set();
      const rowMeta = ws['!rows'] || [];
      for (let ri = 0; ri < rows.length; ri++) {
        const r = rowMeta[ri];
        // hidden=true 或 hpx=0 表示列被隱藏
        if (!r || (!r.hidden && r.hpx !== 0)) {
          visibleRows.add(ri);
        }
      }
    }
    return { branch: f.branch, rows, visibleRows };
  });
 
  const firstRows = branchData[0].rows;
  if (!firstRows || firstRows.length === 0) return null;
 
  // 找標題結束列（第一列有數字的列）
  let headerEnd = 0;
  for (let r = 0; r < Math.min(15, firstRows.length); r++) {
    if (firstRows[r].some(v => typeof v === 'number' && v !== 0)) {
      headerEnd = r;
      break;
    }
  }
 
  // 找科目欄數（第一個數字的欄位）
  let subjCols = 4;
  const dataRow0 = firstRows[headerEnd] || [];
  for (let c = 0; c < dataRow0.length; c++) {
    if (typeof dataRow0[c] === 'number') { subjCols = c; break; }
  }
 
  // 特殊工作表：強制覆寫 subjCols
  const FORCED_SUBJ_COLS = {
    '資產明細表': 1,    // col0=摘要，col1=小計，col2=合計
    '負債明細表': 1,    // 同上
    '信託代理與保證資產': 2,  // 各院欄位略有差異，col0/col1=摘要，col2=金額
    '遞延資產執行明細': 1,   // col0=計畫名稱
    '固資檢核': 1,      // col0=財產項目
    '代管資產檢核': 1,
    '關鍵資訊': 1,
    '關鍵資訊-照服員': 1,
  };
  if (FORCED_SUBJ_COLS[normName] !== undefined) {
    subjCols = FORCED_SUBJ_COLS[normName];
  }
 
  const headers = firstRows.slice(0, headerEnd);
  const dataRows = firstRows.slice(headerEnd);
 
  // 購建固資：只加總可見列（Excel列隱藏的不加總）
  // 第一個分院的可見列集合作為基準
  const visibleSet = branchData[0].visibleRows;
 
  // 加總數字欄位
  const sumRows = dataRows.map((row, ri) => {
    const actualRowIdx = headerEnd + ri;
    // 購建固資：隱藏列的數字欄清空不加總
    const isHidden = normName === '購建固資' && visibleSet && !visibleSet.has(actualRowIdx);
 
    const newRow = row.map((v, ci) => {
      if (ci < subjCols) return v; // 科目欄保留原值
      if (isHidden) return ''; // 隱藏列不加總
      // 數字欄：三院加總
      let total = 0;
      let hasVal = false;
      for (const b of branchData) {
        const bRow = b.rows[actualRowIdx];
        if (!bRow) continue;
        // 對方分院同列也是隱藏則跳過
        if (normName === '購建固資' && b.visibleRows && !b.visibleRows.has(actualRowIdx)) continue;
        const val = bRow[ci];
        const n = typeof val === 'number' ? val : parseFloat(String(val).replace(/,/g,''));
        if (!isNaN(n)) { total += n; hasVal = true; }
      }
      return hasVal ? total : '';
    });
    return newRow;
  });
 
  // 重新計算%欄位（比較增減%）
  // 收支類結構：[科目...][法定預算][本月實際][本月預算][增減金額][增減%][累計實際][累計預算][累計增減][累計%]
  const PCT_SHEETS = new Set(['收支','業收','業外收','醫成','其他業成','管總','研發','業外費用']);
  if (PCT_SHEETS.has(normName)) {
    for (const row of sumRows) {
      const s = subjCols;
      // 本月份
      if (typeof row[s+2] === 'number' && row[s+2] !== 0) {
        row[s+3] = (row[s+1]||0) - (row[s+2]||0);
        row[s+4] = Math.round(row[s+3] / Math.abs(row[s+2]) * 10000) / 100;
      }
      // 累計
      if (typeof row[s+6] === 'number' && row[s+6] !== 0) {
        row[s+7] = (row[s+5]||0) - (row[s+6]||0);
        row[s+8] = Math.round(row[s+7] / Math.abs(row[s+6]) * 10000) / 100;
      }
    }
  }
 
  // 遞延資產執行明細：重新計算%
  // col4=合計(1)，col5=累計執行，col6=%(2)/(1)，col7=增減，col8=%(3)/(1)
  if (normName === '遞延資產執行明細') {
    for (const row of sumRows) {
      const base = row[4]; // 合計(1)
      if (typeof base === 'number' && base !== 0) {
        row[6] = typeof row[5]==='number' ? Math.round(row[5]/base*10000)/100 : '';
        row[8] = typeof row[7]==='number' ? Math.round(row[7]/base*10000)/100 : '';
      }
    }
  }
 
  // 各項費用：重新計算%（若有）
  // 固資檢核：差異數=財產帳帳面-會計帳帳面，重新計算
  if (normName === '固資檢核') {
    for (const row of sumRows) {
      // col1=財產原值，col2=累計折舊，col3=帳面價值(財產)，col4=財產原值，col5=累計折舊，col6=帳面價值(會計)，col7=差異數
      if (typeof row[3]==='number' && typeof row[6]==='number') {
        row[7] = row[3] - row[6]; // 差異數
      }
    }
  }
 
  // 平衡表：重新計算%
  // 平衡表固定欄位：col0-3=資產科目, col4=資產金額, col5=資產%
  //                col6-9=負債科目,   col10=負債金額, col11=負債%
  if (normName === '平衡') {
    // 找合計列取得總資產（資產側col4的合計）
    let totalAsset = 0;
    for (const row of sumRows) {
      const subj = row.slice(0, 4).map(v=>String(v||'').trim()).join('');
      if (subj === '合計' && typeof row[4] === 'number') {
        totalAsset = row[4];
        break;
      }
    }
    if (totalAsset > 0) {
      for (const row of sumRows) {
        // 資產%（col5）= col4 / 總資產 * 100
        if (typeof row[4] === 'number' && row[4] !== 0)
          row[5] = Math.round(row[4] / totalAsset * 10000) / 100;
        else if (row[4] === 0 || row[4] === '') row[5] = '';
 
        // 負債%（col11）= col10 / 總資產 * 100
        if (typeof row[10] === 'number' && row[10] !== 0)
          row[11] = Math.round(row[10] / totalAsset * 10000) / 100;
        else if (row[10] === 0 || row[10] === '') row[11] = '';
      }
    }
  }
 
  // 修改標題中的分院名稱
  const mergedName = loaded.map(f => f.branch).join('、');
  const newHeaders = headers.map(row => row.map((cell, ci) => {
    if (ci === 0) {
      const s = String(cell);
      if (s.includes('分院') && s.length < 40)
        return s.replace(/臺北榮民總醫院作業基金－.+/, '臺北榮民總醫院作業基金－' + mergedName + '合計');
    }
    return cell;
  }));
 
  // 過濾底部文字說明（差異分析等純文字行）
  const cleanRows = sumRows.filter(row => {
    const first = String(row[0]||'').trim();
    if (!first) return row.some(v => typeof v === 'number' && v !== 0);
    if (/^[一二三四五六七八九十]、/.test(first)) return false;
    if (/截至本月|差異分析|較預計|綜上|主要係|備注|註：/.test(first)) return false;
    return true;
  });
 
  return {
    headers: newHeaders,
    rows: cleanRows,
    branches: branchData.map(b => ({ branch: b.branch, rows: b.rows.slice(headerEnd) })),
    subjCols,
  };
}
 
// ===== 匯出 Excel =====
function doExport() {
  if (!Object.keys(merged).length) return;
  setStat('匯出中...', 'run');
 
  const wb = XLSX.utils.book_new();
  const period = (loaded[0]?.period || '月報').replace(/[\/\\?*\[\]:]/g, '');
 
  // 按順序加入工作表
  const order = [...CORE_ORDER.filter(s => merged[s]),
                  ...Object.keys(merged).filter(s => !CORE_ORDER.includes(s))];
 
  for (const normName of order) {
    const m = merged[normName];
    if (!m) continue;
 
    // 合計工作表
    const aoa = [...m.headers, ...m.rows];
    const ws = XLSX.utils.aoa_to_sheet(aoa);
 
    // 設定欄寬
    const range = XLSX.utils.decode_range(ws['!ref'] || 'A1');
    ws['!cols'] = [];
    for (let c = 0; c <= range.e.c; c++) {
      ws['!cols'].push({ wch: c < m.subjCols ? (c===0?30:10) : 16 });
    }
 
    XLSX.utils.book_append_sheet(wb, ws, normName.substring(0, 31));
 
    // 各分院子工作表
    for (const b of m.branches) {
      const baoa = [...m.headers, ...b.rows];
      const bws = XLSX.utils.aoa_to_sheet(baoa);
      const bName = (normName + '-' + b.branch).substring(0, 31);
      XLSX.utils.book_append_sheet(wb, bws, bName);
    }
  }
 
  XLSX.writeFile(wb, '三院合併月報_' + period + '.xlsx');
  setStat('匯出完成！', 'ok');
}
 
// ===== 畫面渲染 =====
function switchTab(tab) {
  curTab = tab;
  ['sum','detail','list'].forEach(t => {
    document.getElementById('tab-'+t).classList.toggle('on', t===tab);
  });
  renderTab();
}
 
function renderTab() {
  if (!Object.keys(merged).length) return;
  if (curTab === 'sum') renderSum();
  else if (curTab === 'detail') renderDetail();
  else renderList();
}
 
function sheetSwitcher() {
  const order = [...CORE_ORDER.filter(s=>merged[s]),
                 ...Object.keys(merged).filter(s=>!CORE_ORDER.includes(s))];
  return '<div class="stabs">' +
    order.map(s => '<button class="stab' + (s===curSheet?' on':'') + '" onclick="curSheet=\'' + s + '\';renderTab()">' + s + '</button>').join('') +
    '</div>';
}
 
 
 
// 資產/負債明細表專用渲染（摘要+小計+合計）
function renderSimpleTable(m, colLabels, maxCols) {
  const period = loaded[0]?.period || '';
  const branches = loaded.map(f=>f.branch).join('、');
 
  let tbody = '';
  for (const row of m.rows) {
    const subj = String(row[0]||'').trim();
    if (!subj && !row[1] && !row[2]) continue;
 
    // 判斷縮排：有摘要的列，col1有值=小計行，col2有值=合計行
    let tdSubj = '<td>'+(subj||'')+'</td>';
    const col1 = row[1]; const col2 = row[2];
    const v1 = (typeof col1==='number'&&col1!==0) ? fn(col1) : '-';
    const v2 = (typeof col2==='number'&&col2!==0) ? fn(col2) : '-';
    tbody += '<tr>'+tdSubj
      +'<td class="num'+(col1<0?' neg':'')+'">'+v1+'</td>'
      +'<td class="num'+(col2<0?' neg':'')+'">'+v2+'</td>'
      +'</tr>';
  }
 
  document.getElementById('content').innerHTML =
    sheetSwitcher() +
    '<div class="twrap">' +
    '<div class="thead-bar"><span class="tt">'+curSheet+'（三院合計）</span><span class="ts">'+branches+'｜'+period+'</span></div>' +
    '<div class="tscroll"><table>' +
    '<thead><tr>'+colLabels.map(l=>'<th>'+l+'</th>').join('')+'</tr></thead>' +
    '<tbody>'+tbody+'</tbody></table></div></div>';
}
 
// 信託代理與保證資產專用渲染
function renderTrustTable(m) {
  const period = loaded[0]?.period || '';
  const branches = loaded.map(f=>f.branch).join('、');
 
  // 信託表：subjCols=2，col0或col1是摘要，col2是金額
  let tbody = '';
  for (const row of m.rows) {
    // 摘要：col0或col1有值
    const subj = (String(row[0]||'').trim() || String(row[1]||'').trim());
    if (!subj) continue;
    const indent = String(row[0]||'').trim() ? 0 : 1;
    const amt = row[2];
    const v = (typeof amt==='number'&&amt!==0) ? fn(amt) : '-';
    tbody += '<tr><td class="i'+indent+'">'+subj+'</td>'
      +'<td class="num'+(amt<0?' neg':'')+'">'+v+'</td></tr>';
  }
 
  document.getElementById('content').innerHTML =
    sheetSwitcher() +
    '<div class="twrap">' +
    '<div class="thead-bar"><span class="tt">'+curSheet+'（三院合計）</span><span class="ts">'+branches+'｜'+period+'</span></div>' +
    '<div class="tscroll"><table>' +
    '<thead><tr><th>摘要</th><th>金額（元）</th></tr></thead>' +
    '<tbody>'+tbody+'</tbody></table></div></div>';
}
 
// 平衡表專用渲染（上下分開：資產 + 負債及淨值）
function renderBalance(m, cards) {
  // 平衡表結構：col0-3=資產科目, col4=資產金額, col5=資產%
  //             col6-9=負債科目, col10=負債金額, col11=負債%
  const ASSET_SUBJ = 4;
  const LIAB_START = 6;
  const LIAB_SUBJ = 4;
 
  let assetBody = '';
  let liabBody = '';
 
  for (const row of m.rows) {
    // 資產側（col0-3有科目才顯示）
    const aSubj = row.slice(0, ASSET_SUBJ).map(v=>String(v||'').trim()).filter(Boolean).join('');
    const aAmt = row[4];
    const aPct = row[5];
    if (aSubj) {
      const indent = getIndent(row, ASSET_SUBJ);
      const amt = (typeof aAmt==='number' && aAmt!==0) ? fn(aAmt) : '-';
      const pct = (typeof aPct==='number' && aPct!==0) ? fnPct(aPct) : '-';
      assetBody += '<tr><td class="i'+indent+'">'+aSubj+'</td>'
        +'<td class="num'+(aAmt<0?' neg':'')+'">'+amt+'</td>'
        +'<td class="num">'+pct+'</td></tr>';
    }
 
    // 負債及淨值側（col6-9有科目才顯示）
    const lCols = row.slice(LIAB_START, LIAB_START+LIAB_SUBJ);
    const lSubj = lCols.map(v=>String(v||'').trim()).filter(Boolean).join('');
    const lAmt = row[10];
    const lPct = row[11];
    if (lSubj) {
      const lindent = getIndent(lCols, LIAB_SUBJ);
      const lamt = (typeof lAmt==='number' && lAmt!==0) ? fn(lAmt) : '-';
      const lpct = (typeof lPct==='number' && lPct!==0) ? fnPct(lPct) : '-';
      liabBody += '<tr><td class="i'+lindent+'">'+lSubj+'</td>'
        +'<td class="num'+(lAmt<0?' neg':'')+'">'+lamt+'</td>'
        +'<td class="num">'+lpct+'</td></tr>';
    }
  }
 
  const period = loaded[0]?.period || '';
  const branches = loaded.map(f=>f.branch).join('、');
 
  document.getElementById('content').innerHTML =
    cards + sheetSwitcher() +
    // 資產表
    '<div class="twrap" style="margin-bottom:16px">' +
    '<div class="thead-bar"><span class="tt">資產（三院合計）</span><span class="ts">'+branches+'｜'+period+'</span></div>' +
    '<div class="tscroll"><table>' +
    '<thead><tr><th>科目名稱</th><th>金額</th><th>％</th></tr></thead>' +
    '<tbody>'+assetBody+'</tbody></table></div></div>' +
    // 負債及淨值表
    '<div class="twrap">' +
    '<div class="thead-bar"><span class="tt">負債及淨值（三院合計）</span><span class="ts">'+branches+'｜'+period+'</span></div>' +
    '<div class="tscroll"><table>' +
    '<thead><tr><th>科目名稱</th><th>金額</th><th>％</th></tr></thead>' +
    '<tbody>'+liabBody+'</tbody></table></div></div>';
}
 
function renderSum() {
  const m = merged[curSheet];
  if (!m) { document.getElementById('content').innerHTML = '<div class="empty"><div>無資料</div></div>'; return; }
 
  // 資產/負債明細表特殊處理：顯示摘要+小計+合計（不顯示備註）
  if (curSheet === '資產明細表' || curSheet === '負債明細表') {
    renderSimpleTable(m, ['摘要','小計（元）','合計（元）'], 3);
    return;
  }
 
  // 信託代理與保證資產特殊處理
  if (curSheet === '信託代理與保證資產') {
    renderTrustTable(m);
    return;
  }
 
  // 收支表顯示指標卡
  let cards = '';
  if (curSheet === '收支') {
    const find = key => {
      const r = m.rows.find(r => r.slice(0,m.subjCols).map(v=>String(v||'').trim()).join('') === key);
      return r ? (typeof r[m.subjCols+1]==='number' ? r[m.subjCols+1] : 0) : 0;
    };
    const inc = find('業務收入'), cost = find('業務成本與費用'), sur = find('本期賸餘（短絀）'), ext = find('業務外收入');
    cards = '<div class="cards">' +
      mkCard('業務收入（本月實際）', fn(inc), loaded.length+'院合計', true) +
      mkCard('業務成本與費用', fn(cost), '本月實際數', false) +
      mkCard('業務外收入', fn(ext), '本月實際數', false) +
      mkCard('本期賸餘（短絀）', '<span style="color:' + (sur<0?'#c0392b':'#1c2b4a') + '">' + fn(sur) + '</span>', '合計', sur>=0) +
      '</div>';
  }
 
  // 平衡表特殊處理（左右並列格式）
  if (curSheet === '平衡') {
    renderBalance(m, cards);
    return;
  }
 
  const colHdrs = buildColHdrs(m.headers, m.subjCols);
  let tbody = '';
  for (const row of m.rows) {
    const subj = row.slice(0, m.subjCols).map(v=>String(v||'').trim()).filter(Boolean).join('');
    if (!subj) continue;
    const indent = getIndent(row, m.subjCols);
    const nums = colHdrs.map((_, i) => {
      const v = row[m.subjCols+i];
      if (v===''||v===null||v===undefined) return '<td class="num">-</td>';
      const n = typeof v==='number' ? v : parseFloat(v);
      if (isNaN(n)||n===0) return '<td class="num">-</td>';
      return '<td class="num' + (n<0?' neg':'') + '">' + fnAuto(n, m.subjCols+i, m.subjCols) + '</td>';
    }).join('');
    tbody += '<tr><td class="i' + indent + '">' + subj + '</td>' + nums + '</tr>';
  }
 
  document.getElementById('content').innerHTML =
    cards + sheetSwitcher() +
    '<div class="twrap">' +
    '<div class="thead-bar"><span class="tt">' + curSheet + '（三院合計）</span>' +
    '<span class="ts">' + loaded.map(f=>f.branch).join('、') + '｜' + (loaded[0]?.period||'') + '</span></div>' +
    '<div class="tscroll"><table>' +
    '<thead><tr><th>科目</th>' + colHdrs.map(h=>'<th>'+h+'</th>').join('') + '</tr></thead>' +
    '<tbody>' + tbody + '</tbody></table></div></div>';
}
 
function renderDetail() {
  const m = merged[curSheet];
  if (!m) return;
  if (!curBranch || !m.branches.find(b=>b.branch===curBranch)) curBranch = m.branches[0]?.branch;
 
  const colHdrs = buildColHdrs(m.headers, m.subjCols);
  const branch = m.branches.find(b=>b.branch===curBranch);
 
  let tbody = '';
  for (let ri = 0; ri < m.rows.length; ri++) {
    const refRow = m.rows[ri];
    const subj = refRow.slice(0,m.subjCols).map(v=>String(v||'').trim()).filter(Boolean).join('');
    if (!subj) continue;
    const bRow = branch?.rows[ri] || [];
    const indent = getIndent(refRow, m.subjCols);
    const nums = colHdrs.map((_, i) => {
      const v = bRow[m.subjCols+i];
      if (v===''||v===null||v===undefined) return '<td class="num">-</td>';
      const n = typeof v==='number' ? v : parseFloat(v);
      if (isNaN(n)||n===0) return '<td class="num">-</td>';
      return '<td class="num' + (n<0?' neg':'') + '">' + fnAuto(n, m.subjCols+i, m.subjCols) + '</td>';
    }).join('');
    tbody += '<tr><td class="i' + indent + '">' + subj + '</td>' + nums + '</tr>';
  }
 
  const branchBtns = m.branches.map(b =>
    '<button class="btab' + (b.branch===curBranch?' on':'') + '" onclick="curBranch=\'' + b.branch + '\';renderTab()">' + b.branch + '</button>'
  ).join('');
 
  document.getElementById('content').innerHTML =
    sheetSwitcher() +
    '<div class="btabs">' + branchBtns + '</div>' +
    '<div class="twrap">' +
    '<div class="thead-bar"><span class="tt">' + curSheet + '—' + curBranch + '</span>' +
    '<span class="ts">' + (loaded.find(f=>f.branch===curBranch)?.period||'') + '</span></div>' +
    '<div class="tscroll"><table>' +
    '<thead><tr><th>科目</th>' + colHdrs.map(h=>'<th>'+h+'</th>').join('') + '</tr></thead>' +
    '<tbody>' + tbody + '</tbody></table></div></div>';
}
 
function renderList() {
  const order = [...CORE_ORDER.filter(s=>merged[s]),
                 ...Object.keys(merged).filter(s=>!CORE_ORDER.includes(s))];
  document.getElementById('content').innerHTML =
    '<div class="cards" style="grid-template-columns:repeat(auto-fill,minmax(180px,1fr))">' +
    order.map(s => {
      const m = merged[s];
      return '<div class="card hl" style="cursor:pointer" onclick="curSheet=\'' + s + '\';switchTab(\'sum\')">' +
        '<div class="card-l">工作表</div>' +
        '<div style="font-size:14px;font-weight:600;color:#1c2b4a;margin:4px 0">' + s + '</div>' +
        '<div class="card-s">' + (m?m.rows.length:0) + ' 列資料</div>' +
        '</div>';
    }).join('') + '</div>';
}
 
// ===== 工具函數 =====
function buildColHdrs(headers, subjCols) {
  if (!headers.length) return [];
  const last = headers[headers.length-1] || [];
  const prev = headers.length>1 ? headers[headers.length-2] : [];
  const prev2 = headers.length>2 ? headers[headers.length-3] : [];
  const result = [];
  for (let c = subjCols; c < Math.max(last.length, 14); c++) {
    const parts = [String(prev2[c]||''), String(prev[c]||''), String(last[c]||'')]
      .map(s=>s.trim().replace(/\n/g,' ')).filter(Boolean);
    result.push(parts.join('<br>') || ('欄'+(c+1)));
  }
  return result;
}
 
function getIndent(row, subjCols) {
  for (let c = subjCols-1; c >= 0; c--)
    if (String(row[c]||'').trim()) return Math.min(c, 3);
  return 0;
}
 
function fn(n) {
  if (n===''||n===null||n===undefined) return '-';
  if (typeof n !== 'number') n = parseFloat(n);
  if (isNaN(n)||n===0) return '-';
  const abs = Math.round(Math.abs(n)).toLocaleString('zh-TW');
  return n < 0 ? '(' + abs + ')' : abs;
}
 
// 百分比專用格式（小數點第二位）
function fnPct(n) {
  if (n===''||n===null||n===undefined) return '-';
  if (typeof n !== 'number') n = parseFloat(n);
  if (isNaN(n)||n===0) return '-';
  const val = Math.round(n * 100) / 100;
  return val.toFixed(2);
}
 
// 智慧格式化：自動判斷是否為%欄位
function fnAuto(v, colIdx, subjCols) {
  // %欄位：subjCols+4（本月%）、subjCols+8（累計%）、以及平衡表的%欄（subjCols+1, subjCols+5）
  const pctCols = [subjCols+4, subjCols+8, subjCols+1, subjCols+5];
  if (pctCols.includes(colIdx)) return fnPct(v);
  return fn(v);
}
 
function mkCard(label, val, sub, hl) {
  return '<div class="card' + (hl?' hl':'') + '">' +
    '<div class="card-l">' + label + '</div>' +
    '<div class="card-v">' + val + '</div>' +
    '<div class="card-s">' + sub + '</div>' +
    '</div>';
}
 
function setStat(msg, type) {
  document.getElementById('stxt').textContent = msg;
  const d = document.getElementById('dot');
  d.className = 'dot' + (type==='ok'?' ok':type==='run'?' run':'');
}
 
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
