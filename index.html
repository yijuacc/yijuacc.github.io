<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>分院決算表合併系統</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');
 
:root {
  --navy: #1c2340;
  --navy2: #263055;
  --gold: #c9a84c;
  --gold-light: #e8c97a;
  --paper: #f5f2ec;
  --white: #ffffff;
  --border: #d8d2c6;
  --border2: #e8e2d8;
  --muted: #7a7060;
  --text: #1a1612;
  --text2: #2e2820;
  --success: #2e7d5a;
  --danger: #a83232;
  --num-pos: #1a3a6b;
  --num-neg: #8b1a1a;
  --num-fx: #2d5a1a;
  --sidebar-w: 300px;
}
 
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: 'Noto Serif TC', serif; background: var(--paper); color: var(--text); overflow: hidden; }
 
.app { display: grid; grid-template-rows: 48px 1fr; grid-template-columns: var(--sidebar-w) 1fr; height: 100vh; }
 
.topbar {
  grid-column: 1/-1; background: var(--navy);
  display: flex; align-items: center; padding: 0 20px; gap: 14px;
  border-bottom: 2px solid var(--gold);
}
.topbar-logo { font-size: 0.65rem; letter-spacing: 0.2em; color: var(--gold); font-family: 'JetBrains Mono', monospace; font-weight: 600; }
.topbar-sep { width: 1px; height: 16px; background: rgba(255,255,255,0.12); }
.topbar-title { font-size: 0.9rem; font-weight: 600; color: #fff; letter-spacing: 0.06em; }
.topbar-year { margin-left: auto; font-family: 'JetBrains Mono', monospace; font-size: 0.62rem; color: rgba(255,255,255,0.35); letter-spacing: 0.1em; }
 
.sidebar {
  background: var(--white); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow-y: auto; padding: 24px 20px 28px;
}
.step-block { padding-bottom: 22px; border-bottom: 1px solid var(--border2); margin-bottom: 22px; }
.step-block:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
.step-label { display: flex; align-items: center; gap: 9px; margin-bottom: 14px; }
.step-num {
  width: 20px; height: 20px; background: var(--navy); color: var(--gold);
  font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; font-weight: 600;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.step-title { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.14em; color: var(--navy); text-transform: uppercase; }
 
.drop-zone {
  border: 2px dashed var(--border); padding: 24px 12px; text-align: center;
  cursor: pointer; transition: all 0.2s; background: var(--paper); position: relative;
}
.drop-zone:hover, .drop-zone.dragover { border-color: var(--gold); background: #fdf8ee; }
.drop-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.drop-icon { font-size: 1.8rem; display: block; margin-bottom: 8px; }
.drop-main { font-size: 0.8rem; font-weight: 600; color: var(--navy); margin-bottom: 3px; }
.drop-sub { font-size: 0.62rem; color: var(--muted); font-family: 'JetBrains Mono', monospace; }
 
.file-chips { display: flex; flex-direction: column; gap: 5px; margin-top: 10px; }
.chip { display: flex; align-items: center; gap: 7px; background: var(--paper); border: 1px solid var(--border2); padding: 6px 9px; animation: chipin 0.15s ease; }
@keyframes chipin { from { opacity:0; transform:translateX(-5px); } to { opacity:1; transform:none; } }
.chip-name { flex: 1; font-size: 0.72rem; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text2); }
.chip-sheets { font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; color: var(--muted); flex-shrink: 0; }
.chip-rm { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 0.85rem; padding: 0 2px; transition: color 0.15s; }
.chip-rm:hover { color: var(--danger); }
 
.upload-note { margin-top: 8px; padding: 6px 9px; font-size: 0.62rem; font-family: 'JetBrains Mono', monospace; border: 1px solid var(--border2); text-align: center; color: var(--muted); }
.upload-note.ok { border-color: var(--success); color: var(--success); background: #f0f9f4; }
.upload-note.warn { border-color: var(--gold); color: #7a6020; background: #fdf8ee; }
 
.btn-primary { width: 100%; background: var(--navy); color: #fff; border: none; padding: 13px; font-family: 'Noto Serif TC', serif; font-size: 0.85rem; font-weight: 600; letter-spacing: 0.08em; cursor: pointer; transition: background 0.2s; display: flex; align-items: center; justify-content: center; gap: 7px; }
.btn-primary:hover:not(:disabled) { background: var(--navy2); }
.btn-primary:disabled { background: #b8b0a4; cursor: not-allowed; }
 
.btn-secondary { width: 100%; background: var(--gold); color: var(--navy); border: none; padding: 12px; font-family: 'Noto Serif TC', serif; font-size: 0.82rem; font-weight: 700; letter-spacing: 0.08em; cursor: pointer; transition: background 0.2s; margin-top: 9px; display: flex; align-items: center; justify-content: center; gap: 7px; }
.btn-secondary:hover:not(:disabled) { background: var(--gold-light); }
.btn-secondary:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-note { font-size: 0.6rem; color: var(--muted); font-family: 'JetBrains Mono', monospace; text-align: center; margin-top: 5px; }
 
.progress-wrap { margin-top: 10px; display: none; }
.progress-wrap.active { display: block; }
.progress-bar-bg { height: 3px; background: var(--border2); overflow: hidden; }
.progress-bar-fill { height: 100%; background: var(--gold); width: 0%; transition: width 0.3s; }
.progress-text { font-size: 0.62rem; font-family: 'JetBrains Mono', monospace; color: var(--muted); margin-top: 5px; line-height: 1.8; max-height: 80px; overflow-y: auto; }
.progress-text .pl { display: block; }
.progress-text .pl.ok { color: var(--success); }
.progress-text .pl.err { color: var(--danger); }
 
.right-panel { display: flex; flex-direction: column; overflow: hidden; background: var(--paper); }
 
.tab-bar { display: flex; align-items: stretch; background: var(--white); border-bottom: 1px solid var(--border); padding: 0 20px; flex-shrink: 0; }
.tab { padding: 12px 18px; font-size: 0.74rem; font-weight: 600; letter-spacing: 0.07em; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; white-space: nowrap; user-select: none; }
.tab:hover { color: var(--navy); }
.tab.active { color: var(--navy); border-bottom-color: var(--gold); }
 
.tab-content { flex: 1; overflow: hidden; display: none; }
.tab-content.active { display: flex; flex-direction: column; }
 
.empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; color: var(--muted); }
.empty-icon { font-size: 2.5rem; opacity: 0.25; }
.empty-text { font-size: 0.75rem; letter-spacing: 0.07em; font-family: 'JetBrains Mono', monospace; }
 
.sheet-nav { display: flex; flex-wrap: wrap; align-content: flex-start; background: var(--white); border-bottom: 1px solid var(--border); padding: 4px 8px 0; flex-shrink: 0; }
.sheet-nav::-webkit-scrollbar { display: none; }
.sheet-nav::-webkit-scrollbar-thumb { display: none; }
.sheet-tab { padding: 5px 11px 4px; font-size: 0.63rem; font-family: 'JetBrains Mono', monospace; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; transition: all 0.12s; flex-shrink: 0; margin-bottom: 4px; }
.sheet-tab:hover { color: var(--navy); background: #f5f0e6; }
.sheet-tab.active { color: var(--navy); border-bottom-color: var(--gold); font-weight: 600; background: #fdf8ee; }
 
.file-sel { border: 1px solid var(--border2); padding: 4px 8px; font-size: 0.65rem; font-family: 'JetBrains Mono', monospace; background: var(--white); cursor: pointer; flex-shrink: 0; margin-right: 8px; color: var(--text2); }
 
.table-wrap { flex: 1; overflow: auto; }
.table-wrap::-webkit-scrollbar { width: 6px; height: 6px; }
.table-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
 
/* ── Decision Table ── */
.dtable {
  border-collapse: collapse;
  font-size: 0.72rem;
  min-width: 100%;
  table-layout: fixed;
}
.dtable .col-subject { width: 240px; min-width: 200px; }
.dtable .col-amt { width: 110px; }
.dtable .col-pct { width: 58px; }
 
.dtable thead th {
  background: var(--navy); color: rgba(255,255,255,0.9);
  padding: 7px 10px; font-size: 0.62rem; letter-spacing: 0.06em;
  font-weight: 500; position: sticky; top: 0; z-index: 10;
  border-right: 1px solid rgba(255,255,255,0.1);
  text-align: center; white-space: nowrap;
}
.dtable thead th.col-subject { text-align: left; padding-left: 14px; }
.dtable thead th.sub-amt { font-weight: 400; color: rgba(255,255,255,0.7); font-size: 0.58rem; }
 
.dtable tbody td {
  padding: 5px 10px; border-bottom: 1px solid var(--border2); border-right: 1px solid var(--border2);
  color: var(--text); vertical-align: middle; overflow: hidden; text-overflow: ellipsis;
}
 
/* Subject column styles by indent level */
.dtable td.subj { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-family: 'Noto Serif TC', serif; }
.dtable td.subj.l0 { font-weight: 700; padding-left: 10px; background: #e8e3d4; color: var(--navy); font-size: 0.73rem; }
.dtable td.subj.l1 { font-weight: 600; padding-left: 22px; font-size: 0.72rem; }
.dtable td.subj.l2 { font-weight: 400; padding-left: 36px; font-size: 0.71rem; }
.dtable td.subj.l3 { font-weight: 400; padding-left: 50px; font-size: 0.69rem; color: var(--muted); }
 
.dtable tbody tr.l0 > td { background: #e8e3d4; }
.dtable tbody tr.l0:hover > td { background: #dedad0; }
.dtable tbody tr:not(.l0):hover > td { background: #f5f0e6; }
 
/* Number cells */
.dtable td.amt {
  text-align: right; font-family: 'JetBrains Mono', monospace;
  font-size: 0.69rem; white-space: nowrap; color: var(--num-pos);
}
.dtable td.amt.neg { color: var(--num-neg); }
.dtable td.amt.zero { color: #ccc; }
.dtable td.amt.fx { color: var(--num-fx); }
.dtable td.pct {
  text-align: right; font-family: 'JetBrains Mono', monospace;
  font-size: 0.63rem; white-space: nowrap; color: var(--muted);
}
.dtable td.pct.neg { color: var(--num-neg); }
 
/* Sheet list */
.sheet-list-wrap { flex: 1; overflow-y: auto; padding: 16px 20px; }
.sheet-list-table { width: 100%; border-collapse: collapse; font-size: 0.72rem; }
.sheet-list-table th { text-align: left; padding: 7px 14px; font-size: 0.6rem; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.1em; color: var(--muted); border-bottom: 2px solid var(--border); }
.sheet-list-table td { padding: 8px 14px; border-bottom: 1px solid var(--border2); font-family: 'JetBrains Mono', monospace; }
.sheet-list-table tr:hover td { background: #f5f0e4; cursor: pointer; }
.badge { display: inline-block; padding: 2px 6px; font-size: 0.58rem; letter-spacing: 0.05em; }
.badge-ok { background: #eef7f2; color: var(--success); border: 1px solid #b8dece; }
.badge-empty { background: #f5f5f5; color: var(--muted); border: 1px solid var(--border); }
</style>
</head>
<body>
<div class="app">
 
  <header class="topbar">
    <span class="topbar-logo">VGHY</span>
    <div class="topbar-sep"></div>
    <span class="topbar-title">分院決算表合併系統</span>
    <span class="topbar-year">中華民國 114 年度</span>
  </header>
 
  <aside class="sidebar">
    <div class="step-block">
      <div class="step-label"><div class="step-num">1</div><span class="step-title">上傳決算表</span></div>
      <div class="drop-zone" id="drop-zone">
        <input type="file" accept=".xls,.xlsx" multiple id="file-input" onchange="handleFiles(this.files)">
        <span class="drop-icon">📁</span>
        <div class="drop-main"><u>點擊選取</u>或拖曳 .xls 至此</div>
        <div class="drop-sub">可同時選取多個檔案</div>
      </div>
      <div class="file-chips" id="file-chips"></div>
      <div class="upload-note" id="upload-note" style="display:none"></div>
    </div>
 
    <div class="step-block">
      <div class="step-label"><div class="step-num">2</div><span class="step-title">產生合併</span></div>
      <button class="btn-primary" id="btn-merge" disabled onclick="mergeFiles()">⚡ 產生合併決算表</button>
      <div class="btn-note" id="merge-note">請先上傳分院決算表</div>
      <div class="progress-wrap" id="progress-wrap">
        <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill"></div></div>
        <div class="progress-text" id="progress-text"></div>
      </div>
    </div>
 
    <div class="step-block">
      <div class="step-label"><div class="step-num">3</div><span class="step-title">下載</span></div>
      <button class="btn-secondary" id="btn-download" disabled onclick="downloadResult()">↓ 下載合併決算表 Excel</button>
      <div class="btn-note">包含所有共通工作表</div>
    </div>
  </aside>
 
  <div class="right-panel">
    <div class="tab-bar">
      <div class="tab active" onclick="switchTab('summary')">加總總覽</div>
      <div class="tab" onclick="switchTab('detail')">各分院明細</div>
      <div class="tab" onclick="switchTab('sheets')">工作表清單</div>
    </div>
 
    <div class="tab-content active" id="tab-summary">
      <div class="empty-state" id="summary-empty"><span class="empty-icon">📊</span><span class="empty-text">合併後將顯示三院加總數據</span></div>
      <div id="summary-inner" style="display:none;flex:1;overflow:hidden;flex-direction:column;">
        <div class="sheet-nav" id="summary-nav"></div>
        <div class="table-wrap" id="summary-wrap"></div>
      </div>
    </div>
 
    <div class="tab-content" id="tab-detail">
      <div class="empty-state" id="detail-empty"><span class="empty-icon">🏥</span><span class="empty-text">上傳分院檔案後查看各院明細</span></div>
      <div id="detail-inner" style="display:none;flex:1;overflow:hidden;flex-direction:column;">
        <div class="sheet-nav" id="detail-nav"></div>
        <div class="table-wrap" id="detail-wrap"></div>
      </div>
    </div>
 
    <div class="tab-content" id="tab-sheets">
      <div class="empty-state" id="sheets-empty"><span class="empty-icon">📋</span><span class="empty-text">上傳檔案後顯示工作表清單</span></div>
      <div class="sheet-list-wrap" id="sheet-list-wrap" style="display:none;">
        <table class="sheet-list-table">
          <thead><tr><th style="width:36px">#</th><th>工作表名稱</th><th>儲存格數</th><th>公式格數</th><th>狀態</th></tr></thead>
          <tbody id="sheet-list-body"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>
 
<script>
// ══════════════════════════════════════════════════════
// State
// ══════════════════════════════════════════════════════
const uploaded = [];
let mergedWb = null;
let curSummarySheet = 0;
let curDetailSheet  = 0;
let curDetailFile   = 0;
 
// ══════════════════════════════════════════════════════
// Upload & DnD
// ══════════════════════════════════════════════════════
const dz = document.getElementById('drop-zone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });
 
function handleFiles(list) {
  Array.from(list).forEach(file => {
    if (!file.name.match(/\.(xls|xlsx)$/i)) return;
    if (uploaded.find(f => f.name === file.name)) return;
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const wb = XLSX.read(new Uint8Array(e.target.result), {
          type:'array', cellFormula:true, cellNF:true, cellStyles:false, cellDates:false
        });
        uploaded.push({ name: file.name, workbook: wb });
        renderChips(); updateState(); renderSheetList(); renderDetailNav();
      } catch(err) { alert('讀取失敗：' + file.name + '\n' + err.message); }
    };
    reader.readAsArrayBuffer(file);
  });
  document.getElementById('file-input').value = '';
}
 
function removeFile(i) {
  uploaded.splice(i, 1);
  renderChips(); updateState(); renderSheetList(); renderDetailNav();
}
 
function renderChips() {
  const wrap = document.getElementById('file-chips');
  wrap.innerHTML = '';
  uploaded.forEach((f,i) => {
    const d = document.createElement('div');
    d.className = 'chip';
    d.innerHTML = `<span class="chip-name" title="${f.name}">${f.name}</span>
      <span class="chip-sheets">${f.workbook.SheetNames.length}張</span>
      <button class="chip-rm" onclick="removeFile(${i})">×</button>`;
    wrap.appendChild(d);
  });
}
 
function updateState() {
  const n = uploaded.length;
  const note = document.getElementById('upload-note');
  const btn  = document.getElementById('btn-merge');
  const mn   = document.getElementById('merge-note');
  note.style.display = n > 0 ? 'block' : 'none';
  if (n === 0) { btn.disabled=true; mn.textContent='請先上傳分院決算表'; }
  else if (n === 1) {
    note.className='upload-note warn'; note.textContent='⚠ 需至少 2 份才能合併';
    btn.disabled=true; mn.textContent='還需上傳更多分院決算表';
  } else {
    note.className='upload-note ok'; note.textContent=`✓ 已載入 ${n} 份，可開始合併`;
    btn.disabled=false; mn.textContent=`合併 ${n} 間分院的所有工作表`;
  }
}
 
// ══════════════════════════════════════════════════════
// Tabs
// ══════════════════════════════════════════════════════
function switchTab(t) {
  ['summary','detail','sheets'].forEach(k => {
    document.getElementById('tab-'+k).classList.toggle('active', k===t);
  });
  document.querySelectorAll('.tab').forEach((el,i) => {
    el.classList.toggle('active', ['summary','detail','sheets'][i]===t);
  });
}
 
// ══════════════════════════════════════════════════════
// Merge
// ══════════════════════════════════════════════════════
function plog(msg, cls='') {
  document.getElementById('progress-wrap').classList.add('active');
  const div = document.getElementById('progress-text');
  const sp = document.createElement('span'); sp.className='pl '+cls; sp.textContent=msg;
  div.appendChild(sp); div.scrollTop=div.scrollHeight;
}
function setProg(p) { document.getElementById('progress-fill').style.width=p+'%'; }
function isNum(c)   { return c && c.t==='n' && c.v != null; }
function hasFx(c)   { return c && typeof c.f==='string' && c.f.length>0; }
function fixTitle(s) {
  if (typeof s !== 'string') return s;
  let r = s.replace(/臺北榮民總醫院作業基金－\S+分院/g, '臺北榮民總醫院作業基金－三院合併');
  if (r===s) r = s.replace(/業基金－\S+分院/, '業基金－三院合併');
  return r;
}
 
function mergeFiles() {
  document.getElementById('progress-text').innerHTML = '';
  document.getElementById('progress-wrap').classList.add('active');
  document.getElementById('btn-merge').disabled = true;
  document.getElementById('btn-download').disabled = true;
  setProg(0);
 
  setTimeout(() => {
    try {
      const wbs = uploaded.map(f => f.workbook);
      const base = wbs[0];
      const sheets = base.SheetNames;
      plog(`合併 ${wbs.length} 間分院 × ${sheets.length} 張工作表`);
 
      const out = XLSX.utils.book_new();
      let summed=0, kept=0, merged=0;
 
      sheets.forEach((name, si) => {
        setProg(Math.round(si/sheets.length*90));
        const bs = base.Sheets[name];
        if (!bs || !bs['!ref']) { XLSX.utils.book_append_sheet(out, {}, name); return; }
 
        const range = XLSX.utils.decode_range(bs['!ref']);
        const allS  = wbs.map(wb => wb.Sheets[name] || null);
        const ns = {};
 
        for (let r=range.s.r; r<=range.e.r; r++) {
          for (let c=range.s.c; c<=range.e.c; c++) {
            const addr = XLSX.utils.encode_cell({r,c});
            const bc = bs[addr];
            if (!bc) continue;
            const nc = Object.assign({}, bc);
 
            if (r < 4 && nc.t==='s' && typeof nc.v==='string') {
              nc.v = fixTitle(nc.v);
              if (nc.w) nc.w = fixTitle(nc.w);
            }
 
            if (isNum(bc)) {
              // Always sum numeric cells (whether formula or not)
              // Keep formula string but update cached value to sum
              let total = bc.v || 0;
              for (let wi=1; wi<allS.length; wi++) {
                const oc = allS[wi]?.[addr];
                if (oc && isNum(oc)) total += (oc.v || 0);
              }
              nc.v = total;
              delete nc.w;
              hasFx(bc) ? kept++ : summed++;
            }
 
            ns[addr] = nc;
          }
        }
 
        ns['!ref']    = bs['!ref'];
        if (bs['!merges']) ns['!merges'] = bs['!merges'];
        if (bs['!cols'])   ns['!cols']   = bs['!cols'];
        if (bs['!rows'])   ns['!rows']   = bs['!rows'];
 
        XLSX.utils.book_append_sheet(out, ns, name);
        merged++;
      });
 
      setProg(100);
      plog(`✓ ${merged}張工作表完成　數值加總:${summed.toLocaleString()}格　公式更新:${kept.toLocaleString()}格`, 'ok');
 
      mergedWb = out;
      document.getElementById('btn-download').disabled = false;
      document.getElementById('btn-merge').disabled = false;
      renderSummaryView();
 
    } catch(err) {
      plog('✗ 合併失敗：' + err.message, 'err');
      document.getElementById('btn-merge').disabled = false;
    }
  }, 80);
}
 
// ══════════════════════════════════════════════════════
// Column Layout Auto-Detection
//
// Each sheet has a different column layout. We detect:
// 1. subjectCols: which cols 0-5 carry subject text (indent levels)
// 2. dataCols: the number columns, paired as (amount, pct) groups
//    detected by scanning header rows for group labels
// ══════════════════════════════════════════════════════
 
function detectLayout(sheet, range) {
  // Step 1: find the rightmost column that has any subject text
  // Subject columns are text-only columns to the left of the first consistent number column
  let firstNumCol = range.e.c;
  const numColCount = {};
  for (let r = range.s.r; r <= Math.min(range.s.r + 30, range.e.r); r++) {
    for (let c = range.s.c; c <= range.e.c; c++) {
      const cell = sheet[XLSX.utils.encode_cell({r, c})];
      if (cell && cell.t === 'n') {
        numColCount[c] = (numColCount[c] || 0) + 1;
      }
    }
  }
  // firstNumCol = smallest col with ≥3 numeric values
  const numCols = Object.keys(numColCount)
    .map(Number)
    .filter(c => numColCount[c] >= 3)
    .sort((a,b) => a-b);
 
  if (numCols.length === 0) return null; // no numeric data
 
  firstNumCol = numCols[0];
  const subjectDepth = firstNumCol; // cols 0..firstNumCol-1 are subject columns
 
  // Step 2: read header rows to identify column group labels
  // Scan rows range.s.r to range.s.r+6 for text above the numeric columns
  const colLabel = {};
  for (let r = range.s.r; r <= Math.min(range.s.r + 6, range.e.r); r++) {
    for (let c = firstNumCol; c <= range.e.c; c++) {
      const cell = sheet[XLSX.utils.encode_cell({r, c})];
      if (cell && cell.t === 's') {
        const txt = (cell.v || '').replace(/\s+/g, '');
        if (txt && !colLabel[c]) colLabel[c] = txt;
      }
    }
  }
 
  // Step 3: build column groups from numCols
  // Group consecutive: if a col is amount and next is %, pair them
  // Heuristic: a "%" column has small values (-100..100) and labeled '％'
  const pctCols = new Set();
  for (const c of numCols) {
    const lbl = colLabel[c] || '';
    if (lbl === '％' || lbl === '%') { pctCols.add(c); continue; }
    // Also detect by value range: if mostly small numbers (-100..100), likely pct
    let pctVotes = 0, total = 0;
    for (let r = range.s.r + 2; r <= Math.min(range.s.r + 20, range.e.r); r++) {
      const cell = sheet[XLSX.utils.encode_cell({r, c})];
      if (cell && cell.t === 'n' && cell.v !== 0) {
        total++;
        if (Math.abs(cell.v) <= 200) pctVotes++;
      }
    }
    if (total > 0 && pctVotes / total > 0.8) pctCols.add(c);
  }
 
  // Build groups: each group = { label, amtCol, pctCol }
  const groups = [];
  const usedCols = new Set();
  for (const c of numCols) {
    if (usedCols.has(c) || pctCols.has(c)) continue;
    // Try to pair with next pct col
    const nextPct = numCols.find(nc => nc > c && pctCols.has(nc) && !usedCols.has(nc));
    const label = colLabel[c] || `欄${c}`;
    groups.push({ label: cleanLabel(label), amtCol: c, pctCol: nextPct });
    usedCols.add(c);
    if (nextPct !== undefined) usedCols.add(nextPct);
 
    if (groups.length >= 5) break; // max 5 groups
  }
 
  return { subjectDepth, groups };
}
 
function cleanLabel(s) {
  return s
    .replace('本年度預算數', '本年度預算數')
    .replace('本年度決算數', '本年度決算數')
    .replace('預算數', '預算數')
    .replace('決算數', '決算數')
    .replace('比較增減', '比較增減')
    .replace('上年度決算數', '上年度決算數')
    .replace('金額', '金額');
}
 
// ══════════════════════════════════════════════════════
// Build Table for a Sheet
// ══════════════════════════════════════════════════════
function buildSheet(sheet) {
  const range = XLSX.utils.decode_range(sheet['!ref']);
  const layout = detectLayout(sheet, range);
 
  if (!layout || layout.groups.length === 0) {
    return buildGenericTable(sheet, range);
  }
 
  const { subjectDepth, groups } = layout;
 
  // Find data start row:
  // Strategy: skip rows 0-3 (title block), then skip any row that has NO numbers
  // in the detected data columns. First row that has at least one number in groups = data start.
  // Also enforce minimum skip of 4 rows (title block is always rows 0-3).
  let dataStart = range.s.r + 4; // skip title block (院名, 表名, 年度, 單位)
 
  // Additionally skip header rows: rows where ALL group amount columns are non-numeric
  for (let r = range.s.r + 4; r <= Math.min(range.s.r + 12, range.e.r); r++) {
    let hasDataNum = false;
    for (const g of groups) {
      const cell = sheet[XLSX.utils.encode_cell({r, c: g.amtCol})];
      if (cell && cell.t === 'n') { hasDataNum = true; break; }
    }
    if (hasDataNum) { dataStart = r; break; }
    dataStart = r + 1; // keep advancing past header rows
  }
 
  // Auto-detect showSubLevels:
  // Find the minimum indent level that actually has numeric data rows.
  // Show from that level + 1 deeper (so we always get at least 2 visible levels).
  let minDataLvl = subjectDepth; // start high
  for (let r = dataStart; r <= Math.min(dataStart + 60, range.e.r); r++) {
    let hasAmt = false;
    for (const g of groups) {
      const c = sheet[XLSX.utils.encode_cell({r, c: g.amtCol})];
      if (c && c.t === 'n') { hasAmt = true; break; }
    }
    if (!hasAmt) continue;
    for (let ci = range.s.c; ci < range.s.c + subjectDepth; ci++) {
      const cell = sheet[XLSX.utils.encode_cell({r: r, c: ci})];
      if (cell && cell.t === 's' && cell.v) {
        const lvl = ci - range.s.c;
        if (lvl < minDataLvl) minDataLvl = lvl;
        break;
      }
    }
  }
  if (minDataLvl === subjectDepth) minDataLvl = 0; // fallback
  const showSubLevels = minDataLvl + 1; // show min level + one deeper
  const table = document.createElement('table');
  table.className = 'dtable';
 
  // colgroup
  const cg = document.createElement('colgroup');
  const cs = document.createElement('col'); cs.className='col-subject'; cg.appendChild(cs);
  groups.forEach(g => {
    const ca = document.createElement('col'); ca.className='col-amt'; cg.appendChild(ca);
    if (g.pctCol !== undefined) { const cp = document.createElement('col'); cp.className='col-pct'; cg.appendChild(cp); }
  });
  table.appendChild(cg);
 
  // thead (2 rows)
  const thead = document.createElement('thead');
  const hr1 = document.createElement('tr');
  const th0 = document.createElement('th');
  th0.className='col-subject'; th0.textContent='科目'; th0.rowSpan=2;
  hr1.appendChild(th0);
  groups.forEach(g => {
    const th = document.createElement('th');
    th.colSpan = g.pctCol !== undefined ? 2 : 1;
    th.textContent = g.label;
    hr1.appendChild(th);
  });
  thead.appendChild(hr1);
 
  const hr2 = document.createElement('tr');
  groups.forEach(g => {
    const ta = document.createElement('th'); ta.className='col-amt sub-amt'; ta.textContent='金額'; hr2.appendChild(ta);
    if (g.pctCol !== undefined) { const tp = document.createElement('th'); tp.className='col-pct sub-amt'; tp.textContent='%'; hr2.appendChild(tp); }
  });
  thead.appendChild(hr2);
  table.appendChild(thead);
 
  // tbody
  const tbody = document.createElement('tbody');
 
  for (let r = dataStart; r <= range.e.r; r++) {
    // Determine subject and indent level
    let subjectTxt = '';
    let lvl = -1;
    for (let ci = range.s.c; ci < range.s.c + subjectDepth; ci++) {
      const cell = sheet[XLSX.utils.encode_cell({r: r, c: ci})];
      if (cell && cell.t === 's' && cell.v) {
        subjectTxt = (cell.v || '').trim();
        lvl = ci - range.s.c;
        break;
      }
    }
 
    // Check if row has numbers
    let hasAmt = false;
    for (const g of groups) {
      const c = sheet[XLSX.utils.encode_cell({r, c: g.amtCol})];
      if (c && c.t === 'n') { hasAmt = true; break; }
    }
 
    if (!subjectTxt && !hasAmt) continue;
    if (subjectTxt && /^註[：:]/.test(subjectTxt)) break;
 
    // Skip rows below showSubLevels
    if (lvl > showSubLevels) continue;
    // Also skip spacer rows with no subject but also no numbers to show
    if (!subjectTxt && !hasAmt) continue;
 
    const tr = document.createElement('tr');
    if (lvl === 0) tr.classList.add('l0');
 
    // Subject cell
    const tdS = document.createElement('td');
    tdS.className = `subj l${Math.max(0, lvl)}`;
    tdS.textContent = subjectTxt;
    tdS.title = subjectTxt;
    tr.appendChild(tdS);
 
    // Data cells
    groups.forEach(g => {
      const amtCell = sheet[XLSX.utils.encode_cell({r, c: g.amtCol})];
      const pctCell = g.pctCol !== undefined ? sheet[XLSX.utils.encode_cell({r, c: g.pctCol})] : null;
 
      const tdA = document.createElement('td');
      tdA.className = 'amt';
      if (amtCell && amtCell.t === 'n' && amtCell.v != null) {
        const v = amtCell.v;
        if (hasFx(amtCell)) tdA.classList.add('fx');
        if (v < 0)      { tdA.classList.add('neg'); tdA.textContent = '(' + fmtInt(Math.abs(v)) + ')'; }
        else if (v === 0) { tdA.classList.add('zero'); tdA.textContent = '-'; }
        else              { tdA.textContent = fmtInt(v); }
      }
      tr.appendChild(tdA);
 
      if (g.pctCol !== undefined) {
        const tdP = document.createElement('td');
        tdP.className = 'pct';
        if (pctCell && pctCell.t === 'n' && pctCell.v != null) {
          const v = pctCell.v;
          if (v < 0) { tdP.classList.add('neg'); tdP.textContent = '(' + Math.abs(v).toFixed(2) + ')'; }
          else if (v === 0) tdP.textContent = '-';
          else tdP.textContent = v.toFixed(2);
        }
        tr.appendChild(tdP);
      }
    });
 
    tbody.appendChild(tr);
  }
 
  table.appendChild(tbody);
  return table;
}
 
// Fallback: generic table for non-decision sheets
function buildGenericTable(sheet, range) {
  const maxR = Math.min(range.e.r, range.s.r+199);
  const maxC = Math.min(range.e.c, range.s.c+24);
 
  const table = document.createElement('table');
  table.className = 'dtable';
  table.style.tableLayout = 'auto';
 
  const thead = document.createElement('thead');
  const hr = document.createElement('tr');
  const empty = document.createElement('th'); empty.style.width='32px'; hr.appendChild(empty);
  for (let c=range.s.c; c<=maxC; c++) {
    const th = document.createElement('th'); th.style.minWidth='80px'; th.textContent=XLSX.utils.encode_col(c); hr.appendChild(th);
  }
  thead.appendChild(hr); table.appendChild(thead);
 
  const tbody = document.createElement('tbody');
  for (let r=range.s.r; r<=maxR; r++) {
    const tr = document.createElement('tr');
    const rh = document.createElement('td');
    rh.style.cssText='color:#aaa;font-size:.6rem;font-family:monospace;text-align:center;padding:4px 6px;background:#f0ece4;border-right:1px solid #e0dbd0;position:sticky;left:0;min-width:32px;';
    rh.textContent = r+1; tr.appendChild(rh);
 
    for (let c=range.s.c; c<=maxC; c++) {
      const addr = XLSX.utils.encode_cell({r,c});
      const cell = sheet[addr];
      const td = document.createElement('td');
      if (cell) {
        if (cell.t==='n' && cell.v!=null) {
          td.className='amt' + (cell.v<0?' neg':'');
          if (hasFx(cell)) td.classList.add('fx');
          td.textContent = cell.v<0 ? '('+fmtInt(Math.abs(cell.v))+')' : fmtInt(cell.v);
        } else {
          td.style.cssText='font-size:.7rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px;';
          td.textContent = cell.w || cell.v || '';
          td.title = String(cell.v||'');
        }
      }
      tr.appendChild(td);
    }
    tbody.appendChild(tr);
  }
  table.appendChild(tbody);
  return table;
}
 
// ══════════════════════════════════════════════════════
// Summary (merged result)
// ══════════════════════════════════════════════════════
function renderSummaryView() {
  if (!mergedWb) return;
  document.getElementById('summary-empty').style.display='none';
  const inner = document.getElementById('summary-inner');
  inner.style.display='flex';
 
  const nav = document.getElementById('summary-nav');
  nav.innerHTML='';
  mergedWb.SheetNames.forEach((name,i) => {
    const t = document.createElement('div');
    t.className='sheet-tab'+(i===0?' active':'');
    t.textContent=name;
    t.onclick=()=>goSummarySheet(i);
    nav.appendChild(t);
  });
  goSummarySheet(0);
  switchTab('summary');
}
 
function goSummarySheet(i) {
  curSummarySheet=i;
  document.querySelectorAll('#summary-nav .sheet-tab').forEach((t,j)=>t.classList.toggle('active',j===i));
  const sheet = mergedWb.Sheets[mergedWb.SheetNames[i]];
  const wrap = document.getElementById('summary-wrap');
  wrap.innerHTML='';
  if (!sheet || !sheet['!ref']) {
    wrap.innerHTML='<div style="padding:24px;color:#aaa;font-family:monospace;font-size:.7rem;">此工作表無資料</div>';
    return;
  }
  // showSubLevels=1: show lvl0 (top categories) + lvl1 (sub-categories), hide detail rows (lvl2+)
  wrap.appendChild(buildSheet(sheet));
}
 
// ══════════════════════════════════════════════════════
// Detail (per file)
// ══════════════════════════════════════════════════════
function renderDetailNav() {
  const empty=document.getElementById('detail-empty');
  const inner=document.getElementById('detail-inner');
  if (uploaded.length===0){empty.style.display='flex';inner.style.display='none';return;}
  empty.style.display='none'; inner.style.display='flex';
 
  const nav=document.getElementById('detail-nav');
  nav.innerHTML='';
 
  const sel=document.createElement('select'); sel.className='file-sel';
  uploaded.forEach((f,i)=>{
    const o=document.createElement('option');
    o.value=i; o.textContent=f.name.replace(/\.(xls|xlsx)$/i,'');
    sel.appendChild(o);
  });
  sel.onchange=()=>{curDetailFile=parseInt(sel.value);goDetailSheet(curDetailSheet);};
  nav.appendChild(sel);
 
  uploaded[0].workbook.SheetNames.forEach((name,i)=>{
    const t=document.createElement('div');
    t.className='sheet-tab'+(i===0?' active':'');
    t.textContent=name;
    t.onclick=()=>{curDetailSheet=i;goDetailSheet(i);};
    nav.appendChild(t);
  });
  goDetailSheet(0);
}
 
function goDetailSheet(i) {
  curDetailSheet=i;
  document.querySelectorAll('#detail-nav .sheet-tab').forEach((t,j)=>t.classList.toggle('active',j===i));
  const wb=uploaded[curDetailFile]?.workbook;
  if (!wb) return;
  const sheet=wb.Sheets[wb.SheetNames[i]];
  const wrap=document.getElementById('detail-wrap');
  wrap.innerHTML='';
  if (!sheet||!sheet['!ref']){
    wrap.innerHTML='<div style="padding:24px;color:#aaa;font-family:monospace;font-size:.7rem;">此工作表無資料</div>';
    return;
  }
  wrap.appendChild(buildSheet(sheet));
}
 
// ══════════════════════════════════════════════════════
// Sheet List
// ══════════════════════════════════════════════════════
function renderSheetList() {
  const empty=document.getElementById('sheets-empty');
  const wrap=document.getElementById('sheet-list-wrap');
  if (uploaded.length===0){empty.style.display='flex';wrap.style.display='none';return;}
  empty.style.display='none'; wrap.style.display='block';
 
  const body=document.getElementById('sheet-list-body');
  body.innerHTML='';
  uploaded[0].workbook.SheetNames.forEach((name,i)=>{
    const s=uploaded[0].workbook.Sheets[name];
    let cells=0,fmlas=0;
    if (s&&s['!ref']) {
      const r=XLSX.utils.decode_range(s['!ref']);
      for(let rr=r.s.r;rr<=r.e.r;rr++) for(let cc=r.s.c;cc<=r.e.c;cc++){
        const c=s[XLSX.utils.encode_cell({r:rr,c:cc})];
        if(c){cells++;if(c.f)fmlas++;}
      }
    }
    const isEmpty=!s||!s['!ref'];
    const tr=document.createElement('tr');
    tr.onclick=()=>{if(mergedWb){switchTab('summary');goSummarySheet(i);}};
    tr.innerHTML=`<td style="color:#aaa;font-size:.62rem">${i+1}</td>
      <td style="font-weight:600;color:var(--navy)">${name}</td>
      <td style="color:var(--muted);font-size:.65rem">${cells.toLocaleString()}</td>
      <td style="color:var(--num-fx);font-size:.65rem">${fmlas>0?fmlas.toLocaleString():'-'}</td>
      <td><span class="badge ${isEmpty?'badge-empty':'badge-ok'}">${isEmpty?'空白':'資料'}</span></td>`;
    body.appendChild(tr);
  });
}
 
// ══════════════════════════════════════════════════════
// Formatters
// ══════════════════════════════════════════════════════
function fmtInt(v) {
  if (v==null||!isFinite(v)) return '';
  return Math.round(v).toLocaleString('zh-TW');
}
 
// ══════════════════════════════════════════════════════
// Download
// ══════════════════════════════════════════════════════
function downloadResult() {
  if (!mergedWb) return;
  XLSX.writeFile(mergedWb, '三院合併決算表_114年度.xlsx');
}
